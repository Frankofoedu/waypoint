name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      sdk-python: ${{ steps.filter.outputs.sdk-python }}
      sdk-typescript: ${{ steps.filter.outputs.sdk-typescript }}
      sdk-dotnet: ${{ steps.filter.outputs.sdk-dotnet }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            sdk-python:
              - 'sdk/python/**'
            sdk-typescript:
              - 'sdk/typescript/**'
            sdk-dotnet:
              - 'sdk/dotnet/**'

  backend:
    name: Backend (.NET)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
      - run: dotnet restore
        working-directory: backend
      - run: dotnet build --no-restore
        working-directory: backend
      - run: dotnet test --no-build --verbosity normal
        working-directory: backend

  frontend:
    name: Frontend (React)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: npm test
        working-directory: frontend

  sdk-python:
    name: Python SDK
    needs: changes
    if: needs.changes.outputs.sdk-python == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
        working-directory: sdk/python
      - run: pytest -v
        working-directory: sdk/python

  sdk-typescript:
    name: TypeScript SDK
    needs: changes
    if: needs.changes.outputs.sdk-typescript == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json
      - run: npm ci
        working-directory: sdk/typescript
      - run: npm run build
        working-directory: sdk/typescript
      - run: npm test
        working-directory: sdk/typescript

  sdk-dotnet:
    name: .NET SDK
    needs: changes
    if: needs.changes.outputs.sdk-dotnet == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
      - run: dotnet restore
        working-directory: sdk/dotnet
      - run: dotnet build --no-restore
        working-directory: sdk/dotnet
      - run: dotnet test --no-build --verbosity normal
        working-directory: sdk/dotnet
