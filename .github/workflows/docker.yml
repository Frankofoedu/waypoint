name: Docker

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
      - "**/Dockerfile"

jobs:
  build:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
